<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8" />
		<style>
			html {
				background-color: transparent;
			}

			body {
				width: 200px;
				margin: 0;
				padding: 16px;
				background-color: #2c3e50;
				color: white;
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				border-radius: 12px;
				border: 1px solid #34495e;
			}

			.header {
				display: flex;
				align-items: center;
				gap: 10px;
				margin-bottom: 15px;
			}

			.logo-img {
				width: 24px;
				height: 24px;
				object-fit: contain;
			}

			.title-container {
				display: flex;
				flex-direction: column;
			}

			.title-container b {
				font-size: 14px;
				color: #ecf0f1;
				line-height: 1.2;
			}

			.subtitle {
				font-size: 10px;
				color: #3498db; /* A soft blue to distinguish the sub-label */
				font-weight: bold;
				text-transform: uppercase;
				letter-spacing: 0.5px;
			}

			.status-label {
				font-size: 10px;
				color: #bdc3c7;
				text-transform: uppercase;
				margin-bottom: 4px;
				display: block;
				letter-spacing: 0.5px;
			}

			.status-pill {
				display: inline-block;
				padding: 2px 10px;
				border-radius: 20px;
				background-color: #27ae60;
				font-size: 11px;
				font-weight: bold;
				color: white;
			}

			hr {
				border: 0;
				border-top: 1px solid #34495e;
				margin: 15px 0 10px 0;
			}

			.footer {
				font-size: 10px;
				color: #7f8c8d;
				text-align: center;
				font-style: italic;
			}
		</style>
	</head>
	<body>
		<div class="header">
			<img src="icon.png" class="logo-img" alt="Logo" />
			<div class="title-container">
				<b>SmartAI Collector</b>
				<span class="subtitle">for Topicus</span>
			</div>
		</div>

		<span class="status-label">Status</span>
		<div class="status-pill">Active</div>

		<hr />

		<div class="footer">By Auxilio</div>
	</body>
</html>
